[alembic]
# Путь к миграциям (относительно директории backend/)
script_location = migrations

# Шаблон имени файла миграции
file_template = %%(rev)s_%%(slug)s

# Часовой пояс для меток времени в миграциях
timezone = UTC

# URL базы данных задаётся в migrations/env.py через переменные окружения
# sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
